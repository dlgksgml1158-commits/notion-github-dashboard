name: Fetch Mail Promotions

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 09:00 KST (UTC+9) 1회
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-mail-promotions:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.11 셋업
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Playwright 설치
        run: |
          pip install playwright
          playwright install --with-deps chromium
          sudo apt-get install -y xvfb

      - name: 메일함 프로모션 수집
        # headless 모드에서는 이 SPA의 행 클릭이 내비게이션으로 이어지지
        # 않는 문제가 있어(원인 불명), xvfb로 가상 디스플레이를 띄워
        # headful 모드로 실행한다.
        run: xvfb-run --auto-servernum python3 scripts/fetch_mail_promotions.py
        env:
          MAILPLUG_COOKIES: ${{ secrets.MAILPLUG_COOKIES }}
          MAILPLUG_ID: ${{ secrets.MAILPLUG_ID }}
          MAILPLUG_PW: ${{ secrets.MAILPLUG_PW }}

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-b53e82ab173f/mail_promotions.json
          git diff --staged --quiet || git commit -m "chore: update mail promotions [skip ci]"
          git pull --rebase origin main
          git push
