name: Fetch Dashboard Data

on:
  schedule:
    - cron: '0 * * * *'   # 매 시간 실행
  workflow_dispatch:        # 수동 실행 가능

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Notion Pages
        run: |
          curl -s -X POST https://api.notion.com/v1/search \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"filter":{"value":"page","property":"object"},"page_size":50}' \
            -o data-b53e82ab173f/notion_pages.json

      - name: Fetch Notion Database
        if: ${{ env.NOTION_DATABASE_ID != '' }}
        run: |
          curl -s -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{"page_size":100}' \
            -o data-b53e82ab173f/notion_db.json

      - name: Fetch GitHub User Info
        run: |
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            https://api.github.com/user \
            -o data-b53e82ab173f/github_user.json

      - name: Fetch GitHub Repos
        run: |
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/user/repos?per_page=100&sort=updated&type=all" \
            -o data-b53e82ab173f/github_repos.json

      - name: Fetch GitHub Issues & PRs
        run: |
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/issues?filter=all&state=open&per_page=50" \
            -o data-b53e82ab173f/github_issues.json

      - name: Debug GitHub User Response
        run: |
          python3 -c "import json; d=json.load(open('data-b53e82ab173f/github_user.json')); print('message' in d and d['message'] or 'login OK: ' + d.get('login','?'))"

      - name: Fetch GitHub Activity
        run: |
          USERNAME=$(cat data-b53e82ab173f/github_user.json | python3 -c "import sys,json; print(json.load(sys.stdin)['login'])")
          curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/users/$USERNAME/events?per_page=100" \
            -o data-b53e82ab173f/github_events.json

      - name: Fetch Musinsa Promotion Data
        run: python3 scripts/fetch_musinsa_promo.py

      - name: Set up Python for Playwright
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Fetch Musinsa Partner Promotion Schedule
        run: python3 scripts/fetch_musinsa_partner_promo.py
        env:
          MUSINSA_PARTNER_ID: ${{ secrets.MUSINSA_PARTNER_ID }}
          MUSINSA_PARTNER_PW: ${{ secrets.MUSINSA_PARTNER_PW }}
          MUSINSA_MSS_MAC: ${{ secrets.MUSINSA_MSS_MAC }}

      - name: Save timestamp
        run: |
          echo "{\"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > data-b53e82ab173f/meta.json

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-b53e82ab173f/
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push
