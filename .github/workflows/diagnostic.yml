name: Diagnostic (temporary)

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright pyotp
          playwright install --with-deps chromium

      - name: Run diagnostic
        run: python3 scripts/diag_order_list.py
        env:
          MUSINSA_PARTNER_ID: ${{ secrets.MUSINSA_PARTNER_ID }}
          MUSINSA_PARTNER_PW: ${{ secrets.MUSINSA_PARTNER_PW }}
          MUSINSA_MSS_MAC: ${{ secrets.MUSINSA_MSS_MAC }}
          MUSINSA_PARTNER_TOTP_SECRET: ${{ secrets.MUSINSA_PARTNER_TOTP_SECRET }}
