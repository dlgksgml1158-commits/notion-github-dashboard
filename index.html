<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --text:     #e6edf3;
      --muted:    #8b949e;
      --accent-n: #7c3aed;   /* Notion purple */
      --accent-g: #238636;   /* GitHub green */
      --accent-b: #1f6feb;   /* blue */
      --accent-m: #ff3866;   /* Musinsa pink/red */
      --red:      #da3633;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    header h1 { font-size: 16px; font-weight: 600; }

    #last-updated {
      font-size: 12px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      padding: 20px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 13px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-notion { background: var(--accent-n); }
    .dot-github { background: var(--accent-g); }
    .dot-blue   { background: var(--accent-b); }
    .dot-musinsa { background: var(--accent-m); }

    .card-body { padding: 0; }

    .list-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: inherit;
      transition: background 0.1s;
    }

    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: rgba(255,255,255,0.04); }

    .list-icon {
      font-size: 16px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
      margin-top: 1px;
    }

    .list-main { flex: 1; min-width: 0; }
    .list-title {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .badge {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 20px;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
    }

    .badge-open   { background: #1a4a1e; color: #3fb950; border: 1px solid #238636; }
    .badge-merged { background: #2d1a3e; color: #a371f7; border: 1px solid #7c3aed; }
    .badge-pr     { background: #1a2d4a; color: #58a6ff; border: 1px solid #1f6feb; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
    }

    .stat-item {
      padding: 14px 16px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-item:nth-child(4n) { border-right: none; }
    .stat-item:nth-last-child(-n+4) { border-bottom: none; }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .empty {
      padding: 24px 16px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .loading {
      padding: 24px 16px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }

    .repo-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }

    .repo-item:last-child { border-bottom: none; }

    .repo-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-b);
      text-decoration: none;
    }

    .repo-name:hover { text-decoration: underline; }

    .repo-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .repo-meta {
      display: flex;
      gap: 12px;
      margin-top: 5px;
      font-size: 11px;
      color: var(--muted);
    }

    .lang-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .span-full { grid-column: 1 / -1; }

    .promo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      padding: 16px;
    }

    .promo-item {
      color: inherit;
      text-decoration: none;
      display: block;
    }

    .promo-thumb {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      border-radius: 6px;
      background: var(--bg);
      display: block;
    }

    .promo-brand {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    .promo-name {
      font-size: 12px;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .promo-price {
      margin-top: 4px;
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .promo-discount {
      color: var(--accent-m);
      font-weight: 700;
      font-size: 12px;
    }

    .promo-final {
      font-weight: 600;
      font-size: 13px;
    }

    #gate {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    #gate-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
      width: 300px;
      text-align: center;
    }

    #gate-box h2 { font-size: 15px; margin-bottom: 16px; }

    #gate-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      text-align: center;
      margin-bottom: 12px;
    }

    #gate-btn {
      width: 100%;
      padding: 10px 12px;
      border-radius: 6px;
      border: none;
      background: var(--accent-b);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }

    #gate-error {
      color: var(--red);
      font-size: 12px;
      margin-top: 10px;
      min-height: 14px;
    }

    #app { display: none; }
  </style>
</head>
<body>

<div id="gate">
  <div id="gate-box">
    <h2>🔒 비밀번호를 입력하세요</h2>
    <input type="password" id="gate-input" placeholder="Password" autocomplete="off" />
    <button id="gate-btn">입장</button>
    <div id="gate-error"></div>
  </div>
</div>

<div id="app">
<header>
  <h1>📊 My Dashboard</h1>
  <span id="last-updated">데이터 불러오는 중…</span>
</header>

<div class="grid">

  <!-- ── Notion 요약 통계 ── -->
  <div class="card span-full" id="notion-stats-card">
    <div class="card-header">
      <span class="dot dot-notion"></span> Notion 요약
    </div>
    <div class="card-body stat-grid" id="notion-stats">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

  <!-- ── Notion Pages ── -->
  <div class="card">
    <div class="card-header">
      <span class="dot dot-notion"></span> Notion 최근 페이지
    </div>
    <div class="card-body" id="notion-pages">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

  <!-- ── Notion DB ── -->
  <div class="card">
    <div class="card-header">
      <span class="dot dot-notion"></span> Notion 데이터베이스 항목
    </div>
    <div class="card-body" id="notion-db">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

  <!-- ── GitHub 요약 통계 ── -->
  <div class="card span-full">
    <div class="card-header">
      <span class="dot dot-github"></span> GitHub 요약
    </div>
    <div class="card-body stat-grid" id="github-stats">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

  <!-- ── GitHub 최근 활동 ── -->
  <div class="card">
    <div class="card-header">
      <span class="dot dot-github"></span> GitHub 최근 활동
    </div>
    <div class="card-body" id="github-events">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

  <!-- ── GitHub Issues / PRs ── -->
  <div class="card">
    <div class="card-header">
      <span class="dot dot-blue"></span> Issues &amp; Pull Requests
    </div>
    <div class="card-body" id="github-issues">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

  <!-- ── GitHub Repos ── -->
  <div class="card span-full">
    <div class="card-header">
      <span class="dot dot-github"></span> 최근 업데이트된 Repository
    </div>
    <div class="card-body" id="github-repos">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

  <!-- ── 무신사 할인 특가 ── -->
  <div class="card span-full">
    <div class="card-header">
      <span class="dot dot-musinsa"></span> 무신사 할인 특가
    </div>
    <div class="card-body" id="musinsa-promo">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

  <!-- ── 무신사 파트너 프로모션 일정 ── -->
  <div class="card span-full">
    <div class="card-header">
      <span class="dot dot-musinsa"></span> 무신사 파트너 프로모션 할인
    </div>
    <div class="card-body" id="musinsa-partner-promo">
      <div class="loading">불러오는 중…</div>
    </div>
  </div>

</div>
</div>

<script>
const GATE_HASH = '589302a339e5059513c12b404e3dd270ffef4c8651619c2d3a07787ea6fc0577';

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function tryUnlock() {
  const input = document.getElementById('gate-input');
  const err = document.getElementById('gate-error');
  const hash = await sha256Hex(input.value);
  if (hash === GATE_HASH) {
    sessionStorage.setItem('dash-unlocked', '1');
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initDashboard();
  } else {
    err.textContent = '비밀번호가 올바르지 않습니다';
    input.value = '';
    input.focus();
  }
}

document.getElementById('gate-btn').addEventListener('click', tryUnlock);
document.getElementById('gate-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

if (sessionStorage.getItem('dash-unlocked') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

const BASE = location.origin + location.pathname.replace(/\/[^/]*$/, '');

async function load(file) {
  try {
    const r = await fetch(`${BASE}/data-b53e82ab173f/${file}?_=${Date.now()}`);
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return '방금 전';
  if (diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if (diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  return `${Math.floor(diff/86400)}일 전`;
}

function getTitle(page) {
  const props = page.properties || {};
  for (const key of ['Name','Title','이름','제목']) {
    if (props[key]) {
      const t = props[key].title || props[key].rich_text || [];
      const text = t.map(x => x.plain_text || '').join('');
      if (text) return text;
    }
  }
  return page.url ? '(제목 없음)' : '?';
}

function langColor(lang) {
  const map = {
    JavaScript:'#f1e05a', TypeScript:'#3178c6', Python:'#3572A5',
    HTML:'#e34c26', CSS:'#563d7c', Shell:'#89e051', Go:'#00ADD8',
    Java:'#b07219', Ruby:'#701516', Rust:'#dea584',
  };
  return map[lang] || '#8b949e';
}

// ── Notion Pages ──
async function renderNotionPages() {
  const data = await load('notion_pages.json');
  const el = document.getElementById('notion-pages');
  const statEl = document.getElementById('notion-stats');

  if (!data || !data.results) {
    el.innerHTML = '<div class="empty">notion_pages.json 없음 — GitHub Actions 실행 후 표시됩니다</div>';
    statEl.innerHTML = '<div class="empty" style="grid-column:1/-1">데이터 없음</div>';
    return;
  }

  const pages = data.results.slice(0, 20);
  const dbCount = data.results.filter(p => p.object === 'database').length;
  const pageCount = data.results.filter(p => p.object === 'page').length;

  statEl.innerHTML = `
    <div class="stat-item"><div class="stat-value">${data.results.length}</div><div class="stat-label">전체 항목</div></div>
    <div class="stat-item"><div class="stat-value">${pageCount}</div><div class="stat-label">페이지</div></div>
    <div class="stat-item"><div class="stat-value">${dbCount}</div><div class="stat-label">데이터베이스</div></div>
    <div class="stat-item"><div class="stat-value">${data.has_more ? '50+' : data.results.length}</div><div class="stat-label">검색 결과</div></div>
  `;

  if (!pages.length) { el.innerHTML = '<div class="empty">페이지 없음</div>'; return; }

  el.innerHTML = pages.map(p => {
    const title = getTitle(p);
    const edited = p.last_edited_time ? timeAgo(p.last_edited_time) : '';
    const icon = p.icon?.emoji || (p.object === 'database' ? '🗄️' : '📄');
    return `
      <a class="list-item" href="${p.url || '#'}" target="_blank" rel="noopener">
        <span class="list-icon">${icon}</span>
        <div class="list-main">
          <div class="list-title">${escHtml(title)}</div>
          <div class="list-meta">${p.object === 'database' ? 'Database' : 'Page'} · ${edited}</div>
        </div>
      </a>`;
  }).join('');
}

// ── Notion DB ──
async function renderNotionDb() {
  const data = await load('notion_db.json');
  const el = document.getElementById('notion-db');

  if (!data || !data.results) {
    el.innerHTML = '<div class="empty">notion_db.json 없음 — NOTION_DATABASE_ID Secret 설정 후 표시됩니다</div>';
    return;
  }

  const items = data.results.slice(0, 20);
  if (!items.length) { el.innerHTML = '<div class="empty">항목 없음</div>'; return; }

  el.innerHTML = items.map(p => {
    const title = getTitle(p);
    const edited = p.last_edited_time ? timeAgo(p.last_edited_time) : '';
    const icon = p.icon?.emoji || '📝';

    // 상태 속성 찾기
    const props = p.properties || {};
    let status = '';
    for (const k of Object.keys(props)) {
      if (props[k].type === 'status') { status = props[k].status?.name || ''; break; }
      if (props[k].type === 'select') { status = props[k].select?.name || ''; break; }
    }

    return `
      <a class="list-item" href="${p.url || '#'}" target="_blank" rel="noopener">
        <span class="list-icon">${icon}</span>
        <div class="list-main">
          <div class="list-title">${escHtml(title)}</div>
          <div class="list-meta">${status ? escHtml(status) + ' · ' : ''}${edited}</div>
        </div>
      </a>`;
  }).join('');
}

// ── GitHub Events ──
async function renderGithubEvents() {
  const data = await load('github_events.json');
  const el = document.getElementById('github-events');

  if (!data || !Array.isArray(data)) {
    el.innerHTML = '<div class="empty">github_events.json 없음</div>'; return;
  }

  const events = data.slice(0, 20);
  if (!events.length) { el.innerHTML = '<div class="empty">활동 없음</div>'; return; }

  const typeMap = {
    PushEvent: { icon:'📤', label: e => `${e.payload?.commits?.length || 0}개 커밋 → ${e.repo.name}` },
    PullRequestEvent: { icon:'🔀', label: e => `PR ${e.payload.action}: ${e.payload.pull_request?.title}` },
    IssuesEvent: { icon:'🐛', label: e => `Issue ${e.payload.action}: ${e.payload.issue?.title}` },
    CreateEvent: { icon:'✨', label: e => `${e.payload.ref_type} 생성: ${e.payload.ref || e.repo.name}` },
    WatchEvent: { icon:'⭐', label: e => `${e.repo.name} 스타` },
    ForkEvent: { icon:'🍴', label: e => `${e.repo.name} 포크` },
    DeleteEvent: { icon:'🗑️', label: e => `${e.payload.ref_type} 삭제: ${e.payload.ref}` },
  };

  el.innerHTML = events.map(e => {
    const t = typeMap[e.type] || { icon:'⚡', label: e => e.type };
    const label = t.label(e);
    return `
      <div class="list-item">
        <span class="list-icon">${t.icon}</span>
        <div class="list-main">
          <div class="list-title">${escHtml(label)}</div>
          <div class="list-meta">${timeAgo(e.created_at)}</div>
        </div>
      </div>`;
  }).join('');
}

// ── GitHub Issues/PRs ──
async function renderGithubIssues() {
  const data = await load('github_issues.json');
  const el = document.getElementById('github-issues');

  if (!data || !Array.isArray(data)) {
    el.innerHTML = '<div class="empty">github_issues.json 없음</div>'; return;
  }

  if (!data.length) { el.innerHTML = '<div class="empty">오픈된 이슈/PR 없음</div>'; return; }

  el.innerHTML = data.slice(0, 20).map(i => {
    const isPR = !!i.pull_request;
    const badge = isPR
      ? `<span class="badge badge-pr">PR</span>`
      : `<span class="badge badge-open">Issue</span>`;
    const repo = i.repository_url?.split('/repos/')[1] || '';
    return `
      <a class="list-item" href="${i.html_url}" target="_blank" rel="noopener">
        <span class="list-icon">${isPR ? '🔀' : '🐛'}</span>
        <div class="list-main">
          <div class="list-title">${escHtml(i.title)}</div>
          <div class="list-meta">${escHtml(repo)} · ${timeAgo(i.updated_at)}</div>
        </div>
        ${badge}
      </a>`;
  }).join('');
}

// ── GitHub Repos ──
async function renderGithubRepos() {
  const [reposData, userData] = await Promise.all([load('github_repos.json'), load('github_user.json')]);
  const el = document.getElementById('github-repos');
  const statEl = document.getElementById('github-stats');

  if (!reposData || !Array.isArray(reposData)) {
    el.innerHTML = '<div class="empty">github_repos.json 없음</div>';
    statEl.innerHTML = '<div class="empty" style="grid-column:1/-1">데이터 없음</div>';
    return;
  }

  const totalStars = reposData.reduce((s, r) => s + (r.stargazers_count || 0), 0);
  const langs = [...new Set(reposData.map(r => r.language).filter(Boolean))];

  statEl.innerHTML = `
    <div class="stat-item"><div class="stat-value">${reposData.length}</div><div class="stat-label">전체 Repo</div></div>
    <div class="stat-item"><div class="stat-value">${reposData.filter(r=>!r.fork).length}</div><div class="stat-label">내 Repo</div></div>
    <div class="stat-item"><div class="stat-value">⭐ ${totalStars}</div><div class="stat-label">총 Stars</div></div>
    <div class="stat-item"><div class="stat-value">${langs.length}</div><div class="stat-label">사용 언어</div></div>
  `;

  const repos = reposData.slice(0, 12);
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:0;">` +
    repos.map(r => `
      <div class="repo-item">
        <a class="repo-name" href="${r.html_url}" target="_blank" rel="noopener">${escHtml(r.full_name)}</a>
        <div class="repo-desc">${escHtml(r.description || '설명 없음')}</div>
        <div class="repo-meta">
          ${r.language ? `<span><span class="lang-dot" style="background:${langColor(r.language)}"></span>${escHtml(r.language)}</span>` : ''}
          <span>⭐ ${r.stargazers_count}</span>
          <span>🍴 ${r.forks_count}</span>
          <span>${timeAgo(r.updated_at)}</span>
        </div>
      </div>`).join('') +
  `</div>`;
}

// ── 무신사 할인 특가 ──
async function renderMusinsaPromo() {
  const data = await load('musinsa_promo.json');
  const el = document.getElementById('musinsa-promo');

  if (!data || !Array.isArray(data.items)) {
    el.innerHTML = '<div class="empty">musinsa_promo.json 없음 — GitHub Actions 실행 후 표시됩니다</div>';
    return;
  }

  const items = [...data.items]
    .sort((a, b) => (b.discountRate || 0) - (a.discountRate || 0))
    .slice(0, 12);

  if (!items.length) { el.innerHTML = '<div class="empty">항목 없음</div>'; return; }

  el.innerHTML = `<div class="promo-grid">` + items.map(it => `
    <a class="promo-item" href="${it.productUrl || '#'}" target="_blank" rel="noopener">
      <img class="promo-thumb" src="${it.imgUrl || ''}" loading="lazy" alt="${escHtml(it.name || '')}" />
      <div class="promo-brand">${escHtml(it.brand || '')} · ${escHtml(it.section || '')}</div>
      <div class="promo-name">${escHtml(it.name || '')}</div>
      <div class="promo-price">
        ${it.discountRate ? `<span class="promo-discount">${it.discountRate}%</span>` : ''}
        <span class="promo-final">${(it.finalPrice ?? 0).toLocaleString()}원</span>
      </div>
    </a>`).join('') + `</div>`;
}

// ── 무신사 파트너 프로모션 일정 ──
function fmtPromoDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}

const PROMO_STATUS_LABEL = {
  READY: '모집중',
  RUNNING: '진행중',
  RECRUIT_END: '모집마감',
};

async function renderMusinsaPartnerPromo() {
  const data = await load('musinsa_partner_promotions.json');
  const el = document.getElementById('musinsa-partner-promo');

  if (!data || !Array.isArray(data.items) || !data.items.length) {
    el.innerHTML = '<div class="empty">musinsa_partner_promotions.json 없음 — MUSINSA_PARTNER_ID/PW Secret 설정 후 표시됩니다</div>';
    return;
  }

  const items = [...data.items].sort((a, b) => new Date(a.from) - new Date(b.from));

  el.innerHTML = items.map(it => {
    const label = PROMO_STATUS_LABEL[it.status] || it.status;
    const badge = it.status === 'RUNNING'
      ? `<span class="badge badge-open">${label}</span>`
      : it.status === 'READY'
        ? `<span class="badge badge-pr">${label}</span>`
        : `<span class="badge" style="background:#21262d;color:#8b949e;border:1px solid #30363d;">${label}</span>`;
    const period = `${fmtPromoDate(it.from)} ~ ${fmtPromoDate(it.to)}`;
    const detail = ` · 최소할인율 ${it.minPercent ?? 0}% · 마감 ${it.recruitDeadline || ''}`;
    return `
      <div class="list-item">
        <span class="list-icon">🏷️</span>
        <div class="list-main">
          <div class="list-title">${escHtml(it.name)}</div>
          <div class="list-meta">${period}${detail}</div>
        </div>
        ${badge}
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function renderMeta() {
  const meta = await load('meta.json');
  const el = document.getElementById('last-updated');
  if (meta?.updated_at) {
    el.textContent = `마지막 업데이트: ${timeAgo(meta.updated_at)} (${new Date(meta.updated_at).toLocaleString('ko-KR')})`;
  } else {
    el.textContent = '데이터 파일이 없습니다 — Actions 실행 후 갱신됩니다';
  }
}

// ── 전체 렌더 ──
function initDashboard() {
  Promise.all([
    renderNotionPages(),
    renderNotionDb(),
    renderGithubEvents(),
    renderGithubIssues(),
    renderGithubRepos(),
    renderMusinsaPromo(),
    renderMusinsaPartnerPromo(),
    renderMeta(),
  ]);
}

if (sessionStorage.getItem('dash-unlocked') === '1') {
  initDashboard();
}
</script>
